<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITULO}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --roxo:#5A368C; --roxo-dark:#42276b; --roxo-soft:#efeaf6;
    --offwhite:#EFEEDF; --vermelho:#D2334F; --rose:#F0867D;
    --grad:linear-gradient(135deg,#D2334F 0%,#F0867D 100%);
    --grad-roxo:linear-gradient(135deg,#5A368C 0%,#7d52b5 100%);
    --ink:#2c2435; --muted:#6a6275; --card:#fbfaf3; --line:#e3e0cf;
    --shadow-sm:0 2px 10px rgba(66,39,107,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Lexend',system-ui,sans-serif;background:var(--offwhite);color:var(--ink);line-height:1.62;font-size:16px;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:'Noto Serif',Georgia,serif;line-height:1.2;color:var(--roxo-dark);font-weight:700}

  /* ---------- TOP BAR ---------- */
  .topbar{position:sticky;top:0;z-index:50;background:rgba(239,238,223,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .topbar-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 24px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{height:30px;width:auto;display:block}
  .brand .fallback{font-family:'Noto Serif',serif;font-weight:700;color:var(--roxo);font-size:18px}
  .brand .canal{font-size:12.5px;font-weight:600;color:#fff;background:var(--grad-roxo);padding:4px 12px;border-radius:999px}

  /* ---------- HERO ---------- */
  .hero{max-width:1000px;margin:0 auto;padding:48px 24px 22px}
  .hero .kicker{display:inline-block;background:var(--grad);color:#fff;font-weight:700;font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;padding:6px 14px;border-radius:999px;margin-bottom:16px}
  .hero h1{font-size:clamp(26px,4vw,40px);letter-spacing:-.01em}
  .hero .sub{font-size:17px;color:var(--muted);margin-top:12px;max-width:720px}
  .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
  .meta span{font-size:13px;background:var(--card);border:1px solid var(--line);padding:7px 13px;border-radius:999px;color:var(--ink)}
  .meta b{color:var(--roxo)}

  /* ---------- LAYOUT ---------- */
  main{max-width:1000px;margin:0 auto;padding:10px 24px 64px}
  section{padding:32px 0;border-top:1px solid var(--line)}
  .sec-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--grad-roxo);color:#fff;font-family:'Lexend';font-weight:700;font-size:15px;margin-right:12px;flex-shrink:0}
  .sec-head{display:flex;align-items:center;margin-bottom:14px}
  .sec-head h2{font-size:clamp(20px,2.6vw,26px)}

  p{margin:0 0 12px}
  strong,b{color:var(--roxo-dark);font-weight:600}
  .pill{display:inline-block;background:var(--roxo-soft);color:var(--roxo-dark);font-weight:600;font-size:13px;padding:2px 9px;border-radius:6px}

  /* tabela */
  .tbl{width:100%;border-collapse:collapse;margin:8px 0 18px;font-size:14.5px;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .tbl th{background:var(--roxo);color:#fff;text-align:left;padding:10px 14px;font-family:'Lexend';font-weight:600;font-size:13.5px}
  .tbl td{padding:9px 14px;border-top:1px solid var(--line);vertical-align:top}
  .tbl tr:nth-child(even) td{background:rgba(255,255,255,.4)}
  .tbl td:last-child{color:var(--muted)}
  .tbl-wrap{overflow-x:auto}

  /* grupo de anúncio (Google) */
  .grupo{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin:16px 0;box-shadow:var(--shadow-sm)}
  .grupo-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .grupo-num{width:34px;height:34px;border-radius:10px;background:var(--grad);color:#fff;font-family:'Lexend';font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .grupo-head h3{font-size:18px}

  /* card de carrossel (Meta) */
  .card-meta{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--roxo);border-radius:0 14px 14px 0;padding:16px 20px;margin:14px 0;box-shadow:var(--shadow-sm)}
  .card-meta-tag{display:inline-block;background:var(--roxo-soft);color:var(--roxo-dark);font-weight:600;font-size:13px;padding:3px 11px;border-radius:999px;margin-bottom:10px}

  /* código */
  pre.code{background:#2c2435;color:#f3eefb;font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;font-size:13px;line-height:1.55;padding:14px 16px;border-radius:12px;overflow-x:auto;margin:8px 0 16px;white-space:pre-wrap;word-break:break-all}

  /* callouts */
  .didactic{display:flex;gap:14px;background:var(--roxo-soft);border-left:5px solid var(--roxo);border-radius:0 14px 14px 0;padding:16px 20px;margin:16px 0}
  .didactic .tag{flex-shrink:0;font-size:22px}
  .didactic h4{font-size:15px;margin-bottom:4px;color:var(--roxo)}
  .didactic p{font-size:14.5px;margin:0;color:#4a4357}
  .note{background:#fff6f3;border:1px solid #f6d6cf;border-left:5px solid var(--vermelho);border-radius:0 12px 12px 0;padding:14px 18px;margin:16px 0;font-size:14.5px}
  .note b{color:var(--vermelho)}

  /* listas */
  ul.clean{list-style:none;margin:6px 0 14px}
  ul.clean li{position:relative;padding-left:24px;margin-bottom:8px;font-size:15px}
  ul.clean li::before{content:"";position:absolute;left:4px;top:9px;width:8px;height:8px;border-radius:50%;background:var(--grad)}

  footer{max-width:1000px;margin:0 auto;padding:24px;border-top:1px solid var(--line);color:var(--muted);font-size:13.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  footer b{color:var(--roxo)}

  @media(max-width:640px){
    .hero{padding:32px 18px 18px}
    main{padding:8px 18px 48px}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <!-- Substituir o span pelo <img> do logo Moinho quando disponível em marca/ -->
        <span class="fallback">Moinho</span>
      </div>
      <span class="canal">{{CANAL}}</span>
    </div>
  </div>

  <div class="hero">
    <span class="kicker">Briefing de campanha</span>
    <h1>{{TITULO}}</h1>
    <p class="sub">Cliente: <strong>{{CLIENTE}}</strong> · {{DATA}}</p>
    <div class="meta">
      {{CHIPS}}
    </div>
  </div>

  <main>
    {{CONTEUDO}}
  </main>

  <footer>
    <span>Preparado pela <b>Moinho Digital</b> · Vinícius Luiz</span>
    <span>{{CLIENTE}} · {{DATA}}</span>
  </footer>
</body>
</html>
